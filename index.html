<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClickUp Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --accent:#7c6af7;--accent2:#a78bfa;--text:#e8e8f0;--muted:#6b6b80;
    --success:#34d399;--warning:#fbbf24;--danger:#f87171;--info:#60a5fa;
    --radius:10px;--radius-lg:16px;
    --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100vh}
  .header{border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);z-index:100}
  .logo{font-family:var(--font);font-size:15px;color:var(--text)}.logo span{color:var(--accent2)}
  .setup{max-width:560px;margin:5rem auto 0;padding:0 1.5rem 4rem}
  h1{font-family:var(--font);font-size:32px;letter-spacing:-.03em;line-height:1.15;margin-bottom:.4rem}
  .sub{color:var(--muted);font-size:13px;margin-bottom:2rem}
  label{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .field{margin-bottom:1rem}
  input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 13px;font-size:13px;font-family:var(--mono);color:var(--text);outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}input::placeholder{color:var(--muted)}
  .hint{font-size:11px;color:var(--muted);margin-top:4px}.hint a{color:var(--accent2);text-decoration:none}
  .btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:14px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
  .btn:hover{opacity:.88}.btn:disabled{opacity:.4;cursor:not-allowed}
  .err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:var(--radius);padding:.75rem 1rem;font-size:12px;color:var(--danger);margin-top:.75rem}
  #prog-wrap{max-width:560px;margin:1rem auto 0;padding:0 1.5rem;display:none}
  .prog-inner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.75rem 1rem;max-height:140px;overflow-y:auto}
  .ll{font-size:11px;color:var(--muted);padding:2px 0;animation:fi .2s ease}
  .ll.ok{color:var(--success)}.ll.sp{color:var(--accent2)}.ll.er{color:var(--danger)}
  @keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
  #dash{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;display:none}
  .dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
  .dt{font-family:var(--font);font-size:20px;letter-spacing:-.02em}.dm{font-size:11px;color:var(--muted);margin-top:2px}
  .rbtn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:12px;font-family:var(--mono);padding:7px 14px;cursor:pointer;transition:border-color .15s}
  .rbtn:hover{border-color:var(--accent2);color:var(--accent2)}
  .mrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
  .mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1.1rem}
  .ml{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
  .mv{font-size:26px;font-weight:700;font-family:var(--font);color:var(--text)}
  .mv.u{color:var(--danger)}.mv.l{color:var(--success)}.mv.i{color:var(--accent2)}.mv.w{color:var(--warning)}
  .cgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
  @media(max-width:680px){.cgrid{grid-template-columns:1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.2rem}
  .ct{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .br{display:flex;align-items:center;gap:7px;margin-bottom:8px}
  .bl{font-size:11px;color:var(--muted);width:115px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bt{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
  .bf{height:100%;border-radius:3px}
  .bc{font-size:11px;color:var(--muted);width:22px;text-align:right}
  .badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
  .s0{background:rgba(255,255,255,.06);color:var(--muted)}.s1{background:rgba(124,106,247,.15);color:var(--accent2)}
  .s2{background:rgba(251,191,36,.1);color:var(--warning)}.s3{background:rgba(52,211,153,.1);color:var(--success)}
  .s4{background:rgba(96,165,250,.1);color:var(--info)}.s5{background:rgba(52,211,153,.18);color:var(--success)}
  .pdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  .pu{background:var(--danger)}.ph{background:var(--warning)}.pn{background:var(--info)}.pl{background:var(--muted)}.pp{background:rgba(255,255,255,.12)}
  .av{width:26px;height:26px;border-radius:50%;background:rgba(124,106,247,.2);color:var(--accent2);font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .arow{display:flex;align-items:center;gap:7px;margin-bottom:7px}.an{font-size:11px;color:var(--text);flex:1}
  .srow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
  .frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
  .fb{font-size:10px;font-family:var(--mono);padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
  .fb:hover{border-color:var(--accent);color:var(--accent2)}.fb.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .ttable{width:100%;border-collapse:collapse}
  .ttable th{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:0 8px 8px 0;text-align:left;border-bottom:1px solid var(--border)}
  .ttable td{font-size:11px;padding:8px 8px 8px 0;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  .ttable tr:last-child td{border-bottom:none}.ttable tr:hover td{background:rgba(255,255,255,.02)}
  .tn{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
  .pt{font-size:9px;background:var(--surface2);color:var(--muted);padding:2px 6px;border-radius:5px;white-space:nowrap}
  .tl{color:var(--muted);text-decoration:none;font-size:11px}.tl:hover{color:var(--accent2)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
</style>
</head>
<body>

<header class="header">
  <span class="logo">clickup<span>dash</span></span>
  <span id="hmeta" style="font-size:11px;color:var(--muted)"></span>
</header>

<div id="setup" class="setup">
  <h1>ClickUp Dashboard<br>Generator</h1>
  <p class="sub">// paste URL → instant dashboard</p>

  <div class="field">
    <label>ClickUp Space URL</label>
    <input type="url" id="iurl" placeholder="https://app.clickup.com/90161601633/v/s/90166936041"/>
  </div>

  <button class="btn" id="gbtn" onclick="generate()">
    <span id="gicon">⚡</span>
    <span id="gtxt">Generate Dashboard</span>
  </button>
  <div id="ebox"></div>
</div>

<div id="prog-wrap"><div class="prog-inner" id="plog"></div></div>
<div id="dash"></div>

<script>
// ── Set this to your Cloudflare Worker URL after deploying worker.js ──
const WORKER_URL = 'https://clickupdash.siddharth-06d.workers.dev/';
// ─────────────────────────────────────────────────────────────────────

const PC=['#7c6af7','#34d399','#60a5fa','#fbbf24','#f87171','#a78bfa','#2dd4bf','#fb923c'];
const SC={s0:'#4b4b5e',s1:'#7c6af7',s2:'#fbbf24',s3:'#34d399',s4:'#60a5fa',s5:'#34d399'};
function parseURL(u){const m=u.match(/app\.clickup\.com\/(\d+)\/v\/[sl]\/(\d+)/);return m?{w:m[1],s:m[2]}:null}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ini(n){return(n||'?').split(' ').map(w=>w[0]||'').join('').toUpperCase().slice(0,2)}
function bw(v,m){return m?Math.max(4,Math.round(v/m*100)):0}
function log(msg,cls=''){
  const w=document.getElementById('prog-wrap'),l=document.getElementById('plog');
  w.style.display='block';const d=document.createElement('div');d.className='ll '+cls;
  const t=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent=`[${t}] ${msg}`;l.appendChild(d);l.scrollTop=l.scrollHeight;
}
function setLoading(on){
  const b=document.getElementById('gbtn'),i=document.getElementById('gicon'),t=document.getElementById('gtxt');
  b.disabled=on;i.innerHTML=on?'<span class="spin"></span>':'⚡';t.textContent=on?'Generating…':'Generate Dashboard';
}
function showErr(m){document.getElementById('ebox').innerHTML=`<div class="err">${m}</div>`}
function scls(s){return{'to do':'s0','in progress':'s1','pending for testing':'s2','uat':'s3','release to uat':'s4','live':'s5'}[(s||'').toLowerCase()]||'s0'}
function pcls(p){return{urgent:'pu',high:'ph',normal:'pn',low:'pl'}[p]||'pp'}

window.addEventListener('DOMContentLoaded',()=>{
  const u=localStorage.getItem('cu_url')||'';
  if(u)document.getElementById('iurl').value=u;
});

async function generate(){
  document.getElementById('ebox').innerHTML='';
  document.getElementById('plog').innerHTML='';
  const rawUrl=document.getElementById('iurl').value.trim();
  if(!rawUrl)return showErr('Paste a ClickUp space URL.');
  const ids=parseURL(rawUrl);
  if(!ids)return showErr('URL not recognised. Need: https://app.clickup.com/{workspace}/v/s/{space}');
  if(WORKER_URL==='PASTE_WORKER_URL_HERE')return showErr('Open index.html and set WORKER_URL to your Cloudflare Worker URL. See setup steps below.');
  localStorage.setItem('cu_url',rawUrl);
  setLoading(true);
  document.getElementById('prog-wrap').style.display='block';
  document.getElementById('dash').style.display='none';
  log(`workspace=${ids.w} space=${ids.s}`,'ok');
  log('Calling Claude + ClickUp MCP…','sp');
  try{
    const data=await fetchData(ids);
    log('Data received — building dashboard…','ok');
    render(data,ids);
    log('Done!','ok');
    setTimeout(()=>{document.getElementById('prog-wrap').style.display='none'},1200);
  }catch(e){log('Error: '+e.message,'er');showErr(e.message);}
  finally{setLoading(false)}
}

async function fetchData(ids){
  const prompt=`You have access to the ClickUp MCP server.
1. Call clickup_get_workspace_hierarchy with workspace_id="${ids.w}", space_ids=["${ids.s}"], max_depth=2
2. Call clickup_filter_tasks with space_ids=["${ids.s}"], workspace_id="${ids.w}", include_closed=true, subtasks=true
Return ONLY valid JSON (no markdown, no backticks):
{"spaceName":"","projects":[{"id":"","name":"","taskCount":0}],"tasks":[{"id":"","name":"","status":"","priority":null,"list":"","url":"","assignees":[]}],"assigneeCounts":{},"statusCounts":{},"priorityCounts":{}}
Rules: priority=urgent/high/normal/low/null. Use "none" for null in priorityCounts. Skip null usernames.`;

  const res=await fetch(WORKER_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,messages:[{role:'user',content:prompt}],mcp_servers:[{type:'url',url:'https://mcp.clickup.com/mcp',name:'clickup'}]})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`Error ${res.status}`)}
  const body=await res.json();
  const txt=(body.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  if(!txt)throw new Error('No response — is ClickUp connected at claude.ai/settings/integrations?');
  try{return JSON.parse(txt.replace(/```json|```/g,'').trim())}
  catch{console.error(txt);throw new Error('Parse failed — see console')}
}

function render(data,ids){
  const total=data.tasks?.length||0,urgent=data.priorityCounts?.urgent||0,
    inprog=data.statusCounts?.['in progress']||0,live=data.statusCounts?.live||0,
    pft=data.statusCounts?.['pending for testing']||0;
  const cm={};(data.projects||[]).forEach((p,i)=>{cm[p.name]=PC[i%PC.length]});
  const maxP=Math.max(...(data.projects||[]).map(p=>p.taskCount),1);
  const projB=(data.projects||[]).sort((a,b)=>b.taskCount-a.taskCount).map(p=>
    `<div class="br"><span class="bl" title="${esc(p.name)}">${esc(p.name)}</span><div class="bt"><div class="bf" style="width:${bw(p.taskCount,maxP)}%;background:${cm[p.name]||'#7c6af7'}"></div></div><span class="bc">${p.taskCount}</span></div>`).join('');
  const sord=[['to do','To do'],['in progress','In progress'],['pending for testing','Pending test'],['uat','UAT'],['release to uat','Release to UAT'],['live','Live']];
  const maxS=Math.max(...sord.map(([k])=>data.statusCounts?.[k]||0),1);
  const statB=sord.map(([k,l])=>{const c=data.statusCounts?.[k]||0;if(!c)return'';const sc=scls(k);return`<div class="srow"><span class="badge ${sc}">${l}</span><div class="bt" style="flex:1"><div class="bf" style="width:${bw(c,maxS)}%;background:${SC[sc]||'#888'}"></div></div><span style="font-size:11px;color:var(--muted);min-width:24px;text-align:right">${c}</span></div>`}).join('');
  const pord=[{k:'urgent',l:'Urgent',c:'#f87171'},{k:'high',l:'High',c:'#fbbf24'},{k:'normal',l:'Normal',c:'#60a5fa'},{k:'low',l:'Low',c:'#6b6b80'},{k:'none',l:'None',c:'#2a2a35'}];
  const maxR=Math.max(...pord.map(p=>data.priorityCounts?.[p.k]||0),1);
  const prioB=pord.map(p=>{const c=data.priorityCounts?.[p.k]||0;if(!c)return'';return`<div class="br"><span class="bl">${p.l}</span><div class="bt"><div class="bf" style="width:${bw(c,maxR)}%;background:${p.c}"></div></div><span class="bc">${c}</span></div>`}).join('');
  const maxA=Math.max(...Object.values(data.assigneeCounts||{}),1);
  const assH=Object.entries(data.assigneeCounts||{}).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([n,c])=>
    `<div class="arow"><div class="av">${ini(n)}</div><span class="an">${esc(n)}</span><div class="bt" style="width:60px"><div class="bf" style="width:${bw(c,maxA)}%;background:var(--accent)"></div></div><span style="font-size:11px;color:var(--muted)">${c}</span></div>`).join('');
  const projs=['All',...(data.projects||[]).map(p=>p.name)];
  const fbtns=projs.map(p=>`<button class="fb${p==='All'?' active':''}" onclick="ft(${JSON.stringify(p)})">${p==='All'?'All':esc(p)}</button>`).join('');
  const trows=(data.tasks||[]).map(t=>{const pc=cm[t.list]||'#7c6af7';return`<tr data-p="${esc(t.list||'')}"><td><span class="tn" title="${esc(t.name)}">${esc(t.name)}</span></td><td><span class="pt" style="border-left:2px solid ${pc};padding-left:5px">${esc(t.list||'')}</span></td><td><span class="badge ${scls(t.status||'')}">${esc(t.status||'')}</span></td><td><div style="display:flex;align-items:center;gap:4px"><span class="pdot ${pcls(t.priority)}"></span><span style="font-size:10px;color:var(--muted)">${t.priority||'—'}</span></div></td><td>${t.url?`<a href="${t.url}" target="_blank" class="tl">↗</a>`:''}</td></tr>`}).join('');
  const now=new Date().toLocaleString();
  const el=document.getElementById('dash');
  el.innerHTML=`
<div class="dh"><div><div class="dt">${esc(data.spaceName||'Dashboard')}</div><div class="dm">Generated ${now} · ${total} tasks</div></div><button class="rbtn" onclick="generate()">↻ Refresh</button></div>
<div class="mrow">
  <div class="mc"><div class="ml">Total</div><div class="mv">${total}</div></div>
  <div class="mc"><div class="ml">Urgent</div><div class="mv u">${urgent}</div></div>
  <div class="mc"><div class="ml">In progress</div><div class="mv i">${inprog}</div></div>
  <div class="mc"><div class="ml">Live</div><div class="mv l">${live}</div></div>
  <div class="mc"><div class="ml">Pending test</div><div class="mv w">${pft}</div></div>
</div>
<div class="cgrid">
  <div class="card"><div class="ct">By project</div>${projB||'—'}</div>
  <div class="card"><div class="ct">Status</div>${statB||'—'}</div>
  <div class="card"><div class="ct">Priority</div>${prioB||'—'}</div>
  <div class="card"><div class="ct">Assignees</div>${assH||'—'}</div>
</div>
<div class="card"><div class="ct">Tasks</div><div class="frow">${fbtns}</div>
<table class="ttable"><thead><tr><th>Task</th><th>Project</th><th>Status</th><th>Priority</th><th></th></tr></thead><tbody id="tb">${trows}</tbody></table></div>`;
  el.style.display='block';
  document.getElementById('hmeta').textContent=data.spaceName||'';
  window._rows=[...document.querySelectorAll('#tb tr')];
}
window.ft=function(p){
  document.querySelectorAll('.fb').forEach(b=>b.classList.toggle('active',b.textContent===(p==='All'?'All':p)));
  const tb=document.getElementById('tb');tb.innerHTML='';
  (window._rows||[]).forEach(r=>{if(p==='All'||r.dataset.p===p)tb.appendChild(r)});
};
</script>
</body>
</html>
